<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tricode: Run & Decode - Neon Edition</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --neon-lime: #39ff14;
            --neon-pink: #ff00ff;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15), transparent),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.15), transparent);
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin: 20px 0;
            font-size: 2rem;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            letter-spacing: 4px;
        }

        #top {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            margin-bottom: 20px;
        }

        #top p { margin: 0; font-weight: bold; font-size: 1.2rem; color: #fff; }
        #top span { color: var(--neon-lime); text-shadow: 0 0 8px var(--neon-lime); }

        #container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
        }

        canvas {
            border: 3px solid var(--neon-cyan);
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 10px var(--neon-cyan);
            display: block;
        }

        #controls {
            width: 320px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 2px solid var(--neon-purple);
            padding: 25px;
            border-radius: 20px;
            text-align: left;
            box-shadow: 0 0 15px var(--neon-purple);
            height: 506px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        h3 {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--neon-pink);
            padding-bottom: 8px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .enemy-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(188, 19, 254, 0.1);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 12px;
        }

        .enemy-item img { width: 30px; height: 30px; object-fit: contain; }

        #notification {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg);
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 0 20px var(--neon-cyan);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }

        #notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #menu {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #menu button {
            padding: 20px 60px;
            font-size: 1.5rem;
            background: transparent;
            color: var(--neon-cyan);
            border: 3px solid var(--neon-cyan);
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: all 0.3s;
        }
    </style>
</head>
<body>

<div id="menu">
    <h1>🚀 Tricode: Run & Decode</h1>
    <button onclick="startGame()">System Start</button>
</div>

<div id="top">
    <p>SCORE: <span id="score">0</span></p>
    <p>BEST: <span id="best">0</span></p>
    <p>LIVES: <span id="lives">3</span></p>
    <p>LEVEL: <span id="level">1</span></p>
</div>

<div id="container">
    <canvas id="game" width="500" height="500"></canvas>
    <div id="controls">
        <h3>🎮 Manual de Piloto</h3>
        <p>• Flechas: Movimiento</p>
        <p>• WASD: Disparo</p>
        <p>• <span style="color:var(--neon-lime)">■</span>: Data Bit (+5 pts)</p>
        <p>• ❤️: +1 Vida cada 150 pts</p>
        
        <h3>👾 Amenazas</h3>
        <div class="enemy-item"><img src="enemigo-normal.png"> <p>Interceptor</p></div>
        <div class="enemy-item"><img src="enemigo-fast.png"> <p>Sonda Veloz</p></div>
        <div class="enemy-item"><img src="enemigo-shooter.png"> <p>Artillero</p></div>
        
        <h3>👹 Boss</h3>
        <div class="enemy-item" style="border-color: var(--neon-pink); background: rgba(255, 0, 255, 0.1);">
            <img src="boss.png"> 
            <p>Unidad Omega (Ataque Abanico)</p>
        </div>
    </div>
</div>

<div id="notification"></div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const shootSound = new Audio("shoot.wav");
    const explosionSound = new Audio("explosion.wav");

    const playerImg = new Image(); playerImg.src = "nave-player.png";
    const enemyNormalImg = new Image(); enemyNormalImg.src = "enemigo-normal.png";
    const enemyFastImg = new Image(); enemyFastImg.src = "enemigo-fast.png";
    const enemyShooterImg = new Image(); enemyShooterImg.src = "enemigo-shooter.png";
    const bossImg = new Image(); bossImg.src = "boss.png";

    let player, bullets, enemies, particles = [], powerups = [], enemyBullets = [], boss = null;
    let gameStarted = false, score = 0, lives, invulnerable, gameTime = 0;
    let lastLifeScore = 0, level = 1, spawnInterval, keys = {};
    let playerSpeed = 4;

    let best = localStorage.getItem("bestScore") || 0;
    document.getElementById("best").innerText = best;

    function showNotification(message) {
        const box = document.getElementById("notification");
        box.innerText = message;
        box.classList.add("show");
        setTimeout(() => box.classList.remove("show"), 2500);
    }

    function resetGame() {
        player = { x: 250, y: 250, size: 40 };
        bullets = []; enemies = []; particles = []; powerups = []; enemyBullets = []; boss = null;
        lives = 3; invulnerable = 0; level = 1; gameTime = 0;
        lastLifeScore = Math.floor(score / 150) * 150;
        document.getElementById("level").innerText = level;
        updateSpawnRate();
    }

    function startGame() {
        document.getElementById("menu").style.display = "none";
        gameStarted = true;
    }

    function updateSpawnRate() {
        if (spawnInterval) clearInterval(spawnInterval);
        // Nivel 1: 3s, Nivel 2: 1.5s, Nivel 3+: aún más rápido
        let speed = Math.max(800, 3000 / level); 
        spawnInterval = setInterval(spawnEnemy, speed);
    }

    function spawnPowerup() {
        if (!gameStarted) return;
        powerups.push({ x: Math.random() * 470, y: Math.random() * 470, size: 15 });
    }

    function spawnEnemy() {
        if (!gameStarted || (boss && level === 1)) return; // No enemigos mientras sale el boss 1
        let types = ["normal", "fast", "shooter"];
        let type = types[Math.floor(Math.random() * 3)];
        enemies.push({ x: Math.random() * 460, y: Math.random() * 460, type: type, size: 35, lastShot: 0 });
    }

    function shoot(dx, dy) {
        shootSound.currentTime = 0; shootSound.play();
        bullets.push({ x: player.x + 18, y: player.y + 18, dx: dx, dy: dy, size: 4 });
        createExplosion(player.x + 20, player.y + 20, "#39ff14");
    }

    function createExplosion(x, y, color) {
        explosionSound.currentTime = 0; explosionSound.play();
        for (let i = 0; i < 10; i++) {
            particles.push({ x: x, y: y, dx: (Math.random() - 0.5) * 6, dy: (Math.random() - 0.5) * 6, life: 25, color: color });
        }
    }

    function hit(objA, objB) {
        let ax = objA === player ? objA.x + 15 : objA.x;
        let ay = objA === player ? objA.y + 15 : objA.y;
        let asize = objA === player ? 10 : objA.size;
        let bsize = objB.size || 6;
        return ax < objB.x + bsize && ax + asize > objB.x && ay < objB.y + bsize && ay + asize > objB.y;
    }

    document.addEventListener("keydown", (e) => {
        keys[e.key] = true;
        let k = e.key.toLowerCase();
        if (["w","a","s","d"].includes(k)) {
            let dx = k === "d" ? 7 : (k === "a" ? -7 : 0);
            let dy = k === "s" ? 7 : (k === "w" ? -7 : 0);
            shoot(dx, dy);
        }
    });
    document.addEventListener("keyup", (e) => keys[e.key] = false);

    function loop() {
        if (!gameStarted) { requestAnimationFrame(loop); return; }
        ctx.clearRect(0, 0, 500, 500);
        gameTime += 1000/60;

        if (score >= lastLifeScore + 150) {
            lives++; lastLifeScore += 150;
            showNotification("❤️ EXTRA LIFE GRANTED");
        }

        // Spawn del Jefe a los 2 minutos (Nivel 1)
        if (gameTime >= 120000 && !boss && level === 1) {
            boss = { x: 200, y: -100, size: 100, hp: 50, lastShot: 0 };
            showNotification("⚠️ WARNING: OMEGA UNIT DETECTED");
        }

        if (keys["ArrowUp"]) player.y -= playerSpeed; if (keys["ArrowDown"]) player.y += playerSpeed;
        if (keys["ArrowLeft"]) player.x -= playerSpeed; if (keys["ArrowRight"]) player.x += playerSpeed;
        player.x = Math.max(0, Math.min(460, player.x)); player.y = Math.max(0, Math.min(460, player.y));

        if (invulnerable > 0) { invulnerable--; ctx.globalAlpha = 0.5; }
        ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
        ctx.globalAlpha = 1;

        powerups.forEach((p, i) => {
            ctx.fillStyle = "#39ff14"; ctx.fillRect(p.x, p.y, p.size, p.size);
            if (hit(player, p)) { score += 5; powerups.splice(i, 1); createExplosion(p.x, p.y, "#39ff14"); }
        });

        enemyBullets.forEach((eb, i) => {
            eb.x += eb.dx; eb.y += eb.dy;
            ctx.fillStyle = "#ff0000"; ctx.shadowBlur = 10; ctx.shadowColor = "#ff0000";
            ctx.fillRect(eb.x, eb.y, 6, 6); ctx.shadowBlur = 0;
            if (hit(player, eb) && invulnerable <= 0) { lives--; invulnerable = 60; enemyBullets.splice(i, 1); }
            if (eb.x < 0 || eb.x > 500 || eb.y < 0 || eb.y > 500) enemyBullets.splice(i, 1);
        });

        bullets.forEach((b, i) => {
            b.x += b.dx; b.y += b.dy;
            ctx.fillStyle = "#00ffff"; ctx.fillRect(b.x, b.y, 5, 5);
            if (b.x < 0 || b.x > 500 || b.y < 0 || b.y > 500) bullets.splice(i, 1);
            if (boss && hit(b, boss)) {
                boss.hp--; bullets.splice(i, 1); createExplosion(b.x, b.y, "#ff00ff");
                if (boss.hp <= 0) { 
                    boss = null; score += 500; 
                    level = 2; // PASAR AL NIVEL 2
                    document.getElementById("level").innerText = level;
                    updateSpawnRate(); // MÁS ENEMIGOS
                    showNotification("🏆 BOSS DESTROYED! LEVEL 2 START");
                }
            }
        });

        if (boss) {
            if (boss.y < 50) boss.y += 1;
            boss.x += Math.sin(gameTime/500) * 2;
            ctx.drawImage(bossImg, boss.x, boss.y, boss.size, boss.size);
            
            // ATAQUE EN ABANICO (5 balas cada 3s)
            if (gameTime > boss.lastShot + 3000) {
                let centerAngle = Math.atan2(player.y - (boss.y + 50), player.x - (boss.x + 50));
                for(let i = -2; i <= 2; i++) {
                    let angle = centerAngle + (i * 0.3);
                    enemyBullets.push({ x: boss.x + 50, y: boss.y + 50, dx: Math.cos(angle) * 4, dy: Math.sin(angle) * 4 });
                }
                boss.lastShot = gameTime;
            }
            if (hit(player, boss) && invulnerable <= 0) { lives--; invulnerable = 60; }
        }

        enemies.forEach((e, ei) => {
            let speed = (e.type === "fast" ? 0.04 : 0.01) * (1 + (level * 0.1)); // Enemigos un poco más rápidos según nivel
            e.x += (player.x - e.x) * speed; e.y += (player.y - e.y) * speed;
            let img = e.type === "fast" ? enemyFastImg : (e.type === "shooter" ? enemyShooterImg : enemyNormalImg);
            ctx.drawImage(img, e.x, e.y, 35, 35);

            if (e.type === "shooter" && gameTime > e.lastShot + 2000) {
                let angle = Math.atan2(player.y - e.y, player.x - e.x);
                enemyBullets.push({ x: e.x + 15, y: e.y + 15, dx: Math.cos(angle) * 3, dy: Math.sin(angle) * 3 });
                e.lastShot = gameTime;
            }
            bullets.forEach((b, bi) => {
                if (hit(b, e)) { createExplosion(e.x, e.y, "#ff00ff"); enemies.splice(ei, 1); bullets.splice(bi, 1); score += 10; }
            });
            if (hit(player, e) && invulnerable <= 0) { lives--; invulnerable = 60; }
        });

        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life--;
            ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3);
            if (p.life <= 0) particles.splice(i, 1);
        });

        document.getElementById("score").innerText = score;
        document.getElementById("lives").innerText = lives;
        if (lives <= 0) { 
            if (score > best) { best = score; localStorage.setItem("bestScore", best); document.getElementById("best").innerText = best; }
            resetGame(); showNotification("💀 SYSTEM FAILURE"); 
        }
        requestAnimationFrame(loop);
    }

    resetGame();
    setInterval(spawnPowerup, 5000);
    loop();
</script>
</body>
</html>
