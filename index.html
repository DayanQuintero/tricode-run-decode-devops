<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tricode Studio - Login</title>
    <style>
        /* Variables de color neón */
        :root {
            --primary: #06b6d4; /* Cian neón */
            --secondary: #7c3aed; /* Violeta neón */
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.15) 0px, transparent 50%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor principal con efecto cristal */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        h2 {
            font-size: 1rem;
            font-weight: 400;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #error {
            margin-top: 1rem;
            font-size: 0.875rem;
            min-height: 1.25rem;
            color: #f87171;
            font-weight: 500;
        }

        /* Animación de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Tricode Studio</h1>
        <h2>Panel de Acceso</h2>

        <div class="input-group">
            <input type="text" id="user" placeholder="Usuario" autocomplete="off">
        </div>
        
        <div class="input-group">
            <input type="password" id="pass" placeholder="Contraseña">
        </div>

        <button onclick="login()">Iniciar Sesión</button>

        <p id="error"></p>
    </div>

    <script>
        function login() {
            const user = document.getElementById("user").value;
            const pass = document.getElementById("pass").value;
            const errorElement = document.getElementById("error");

            // Credenciales del sistema
            if (user === "tricode" && pass === "1234") {
                localStorage.setItem("auth", "true");
                // Animación de salida opcional antes de redirigir
                document.querySelector('.login-card').style.opacity = '0';
                setTimeout(() => {
                    window.location.href = "juego.html";
                }, 300);
            } else {
                errorElement.innerText = "Usuario o contraseña incorrectos";
                // Efecto de sacudida visual para el error
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                card.offsetHeight; // trigger reflow
                card.style.animation = 'shake 0.4s';
            }
        }

        // Estilo de animación para el error
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
